  var googleMapsReady = false;

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAnO5hhAbWl5nu5tQoTV4TL2n1CGzrHgTs&libraries=geometry&callback=initGoogleMaps" async defer></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .header {
    background: #ffffff;
    padding: 12px 24px; border-bottom: 1px solid #e2e8f0;

  /* SIDEBAR */

  /* TABS */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 14px; background: #e2e8f0; border-radius: 8px; padding: 4px; }

  /* FORM STYLES */

  }
  .form-section-title {
    font-size: 12px; font-weight: 700; color: #94a3b8;

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-group { flex: 1; }

  .researcher-card .rc-header {

    margin-bottom: 10px;
  }
  .researcher-card .rc-name { font-size: 13px; font-weight: 700; color: #334155; }
  .researcher-card .rc-color {
    width: 12px; height: 12px; border-radius: 50%; display: inline-block;
    margin-right: 6px; vertical-align: middle;
  }
  .btn-remove {
    background: #fef2f2; border: 1px solid #fecaca; color: #ef4444;
    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .btn-remove:hover { background: #fee2e2; }
  .market-entry {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
    padding: 8px; margin-top: 8px; position: relative;
  }
  .market-entry .me-title { font-size: 11px; color: #94a3b8; font-weight: 600; margin-bottom: 6px; }
  .btn-add-market {
    background: transparent; border: 1px dashed #cbd5e1; color: #94a3b8;
    padding: 6px; border-radius: 6px; cursor: pointer; font-size: 11px;
    width: 100%; margin-top: 6px; transition: all 0.2s;
  }
  .btn-add-market:hover { border-color: #ef4444; color: #ef4444; }
  /* Main buttons */
  .btn-primary {
    background: linear-gradient(135deg, #ef4444, #dc2626); border: none;
    color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 700; width: 100%; margin-top: 8px;
    transition: all 0.2s; letter-spacing: 0.5px;

  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .btn-secondary {

    font-size: 12px; font-weight: 600; width: 100%; margin-top: 6px;
  }
  .btn-secondary:hover { background: #dcfce7; }
  /* RESULTS STYLES */
  .card {
    background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 14px; margin-bottom: 10px;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title { font-size: 13px; font-weight: 700; }
  .badge {
    padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
  }
  .badge-red { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .badge-green { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .badge-yellow { background: #fefce8; color: #ca8a04; border: 1px solid #fde68a; }
  .stat-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .stat {
    flex: 1; background: #f8fafc; border-radius: 6px; padding: 6px 8px; text-align: center;
    border: 1px solid #e2e8f0;

  .stat-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 14px; font-weight: 700; margin-top: 1px; color: #334155; }
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {

  .tl-item { position: relative; margin-bottom: 8px; }

  /* Gantt */

  .gantt-bar {

  /* Map */
  .map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  /* Summary table */
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  th { font-size: 10px; color: #94a3b8; text-align: left; padding: 5px 6px; border-bottom: 1px solid #e2e8f0; }

    text-align: center; padding: 40px 20px; color: #94a3b8;

  /* Scrollbar */

<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo" style="font-size:24px;font-weight:900;color:#ef4444;letter-spacing:-0.5px;line-height:1;">Zukkin</div>
    <div style="width:1px;height:24px;background:#e2e8f0;"></div>
    <h1>Otimizador de Rotas</h1>
  </div>
  <div class="header-info" id="headerInfo">Preencha os dados e clique em "Calcular Rotas"</div>
</div>
<div class="main-layout">
  <div class="sidebar">
    <div class="tab-bar">
      <button class="tab active" onclick="showTab('entrada', event)">Entrada de Dados</button>
      <button class="tab" onclick="showTab('resultado', event)">Resultado</button>
      <button class="tab" onclick="showTab('recomendacao', event)">Recomendação</button>
    </div>
    <!-- ENTRADA DE DADOS -->
    <div id="entrada" class="panel active">
      <div class="form-section">
        <div class="form-section-title">Configurações Gerais</div>
        <div class="form-row">
          <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="cidade" placeholder="Ex: Feira de Santana/BA" value="Feira de Santana/BA">
          </div>
          <div class="form-group" style="max-width:140px;">
            <label>Início jornada</label>
            <input type="time" id="inicioJornada" value="08:00">
          </div>
        </div>
        <!-- API key pode ser configurada via JS: document.getElementById('googleApiKey').value = 'SUA_KEY' -->
        <input type="hidden" id="googleApiKey" value="AIzaSyAnO5hhAbWl5nu5tQoTV4TL2n1CGzrHgTs">
        <div id="apiStatus" style="display:none;"></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">
          Pesquisadores
          <button class="btn-add-market" style="width:auto;padding:4px 12px;" onclick="addResearcher()">+ Pesquisador</button>
        </div>
        <div id="researchersList"></div>
      </div>
      <button class="btn-primary" onclick="calculateRoutes()">CALCULAR ROTAS</button>
      <button class="btn-secondary" onclick="loadSampleData()">Carregar dados de exemplo (Feira de Santana)</button>
    </div>
    <!-- RESULTADO -->
    <div id="resultado" class="panel">
      <div id="resultContent">
        <div class="empty-state">
          <h3>Nenhum cálculo realizado</h3>
          <p>Preencha os dados na aba "Entrada de Dados" e clique em "Calcular Rotas"</p>
        </div>
      </div>
    </div>
    <!-- RECOMENDACAO -->
    <div id="recomendacao" class="panel">
      <div id="recoContent">
        <div class="empty-state">
          <h3>Aguardando cálculo</h3>
          <p>A recomendação será gerada após o cálculo das rotas</p>
        </div>
      </div>
    </div>
  </div>
  <div class="map-container">
    <div id="map"></div>
  </div>
</div>
<script>
// ======================== STATE ========================
const COLORS = ['#f97316','#a855f7','#3b82f6','#10b981','#ef4444','#ec4899','#06b6d4','#eab308'];
let researchers = [];
let researcherIdCounter = 0;
let map, markers = [], routeLines = [];
// ======================== MAP INIT ========================
map = L.map('map', { zoomControl: true, attributionControl: false }).setView([-12.260, -38.955], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
// ======================== TAB NAVIGATION ========================
function showTab(tabId, evt) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if (evt && evt.target) evt.target.classList.add('active');
  else if (window.event && window.event.target) window.event.target.classList.add('active');
}
// ======================== RESEARCHER MANAGEMENT ========================
function addResearcher() {
  const id = researcherIdCounter++;
  const color = COLORS[researchers.length % COLORS.length];
  researchers.push({ id, color, markets: [{ id: 0 }], marketIdCounter: 1 });
  renderResearchers();
}
function removeResearcher(id) {
  researchers = researchers.filter(r => r.id !== id);
  researchers.forEach((r, i) => r.color = COLORS[i % COLORS.length]);
  renderResearchers();
}
function addMarket(researcherId) {
  const r = researchers.find(r => r.id === researcherId);
  if (r) {
    r.markets.push({ id: r.marketIdCounter++ });
    renderResearchers();
  }
}
function removeMarket(researcherId, marketId) {
  const r = researchers.find(r => r.id === researcherId);
  if (r && r.markets.length > 1) {
    r.markets = r.markets.filter(m => m.id !== marketId);
    renderResearchers();
  }
}
function renderResearchers() {
  const container = document.getElementById('researchersList');
  container.innerHTML = researchers.map((r, idx) => `
    <div class="researcher-card" data-rid="${r.id}">
      <div class="rc-header">
        <div>
          <span class="rc-color" style="background:${r.color}"></span>
          <span class="rc-name">Pesquisador ${idx + 1}</span>
        </div>
        <button class="btn-remove" onclick="removeResearcher(${r.id})">Remover</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="rName_${r.id}" placeholder="Nome do pesquisador">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>PPM (prod/min)</label>
          <input type="number" id="rPPM_${r.id}" step="0.01" min="0.1" placeholder="Ex: 2.62">
        </div>
        <div class="form-group">
          <label>Conformidade (%)</label>
          <input type="number" id="rConf_${r.id}" step="0.01" min="0" max="100" placeholder="Ex: 41.43">
        </div>
        <div class="form-group">
          <label>Contrato (h)</label>
          <input type="number" id="rContract_${r.id}" min="1" max="24" placeholder="Ex: 8">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Endereço da casa</label>
          <input type="text" id="rHome_${r.id}" placeholder="Rua, Bairro - Cidade/UF">
        </div>
      </div>
      <div class="section-title" style="margin:8px 0 4px;">Mercados</div>
      ${r.markets.map((m, mi) => `
        <div class="market-entry" data-mid="${m.id}">
          <div class="me-title" style="display:flex;justify-content:space-between;">
            Mercado ${mi + 1}
            ${r.markets.length > 1 ? `<button class="btn-remove" style="font-size:10px;padding:2px 6px;" onclick="removeMarket(${r.id},${m.id})">X</button>` : ''}
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Nome do mercado</label>
              <input type="text" id="mName_${r.id}_${m.id}" placeholder="Ex: Mix Mateus">
            </div>
            <div class="form-group" style="max-width:90px;">
              <label>Itens</label>
              <input type="number" id="mItems_${r.id}_${m.id}" placeholder="374" min="1">
            </div>
            <div class="form-group" style="max-width:120px;">
              <label>Prazo entrega</label>
              <input type="time" id="mDeadline_${r.id}_${m.id}" value="17:00">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Endereço completo</label>
              <input type="text" id="mAddr_${r.id}_${m.id}" placeholder="Av., número - Bairro, Cidade/UF">
            </div>
          </div>
        </div>
      `).join('')}
      <button class="btn-add-market" onclick="addMarket(${r.id})">+ Adicionar Mercado</button>
    </div>
  `).join('');
}
// ======================== GEOCODING & DISTANCE ========================
let geocodingAvailable = null; // null = not tested yet
let geocodingProvider = null; // 'google'
// Cache for Directions API results to avoid duplicate requests
let directionsCache = {};

function getGoogleApiKey() {
  return (document.getElementById('googleApiKey')?.value || '').trim();
}

function updateApiStatus(text, color) {
  const el = document.getElementById('apiStatus');
  if (el) { el.textContent = text; el.style.color = color || '#64748b'; }
}

// ---- GOOGLE GEOCODING ----
function geocodeWithGoogle(address) {
  return new Promise((resolve, reject) => {
    if (!window.google || !window.google.maps) { reject(new Error('Google Maps não carregou')); return; }
    const geocoder = new google.maps.Geocoder();
    geocoder.geocode({ address: address, region: 'br' }, (results, status) => {
      if (status === 'OK' && results && results.length > 0) {
        const loc = results[0].geometry.location;
        resolve({ lat: loc.lat(), lng: loc.lng(), display: results[0].formatted_address });
      } else if (status === 'REQUEST_DENIED' || status === 'OVER_QUERY_LIMIT') {
        reject(new Error('Google Geocoder: ' + status));
      } else {
        resolve(null);
      }
    });
  });
}

// ---- WAIT FOR GOOGLE MAPS TO LOAD ----
function waitForGoogleMaps(timeoutMs = 10000) {
  return new Promise((resolve) => {
    if (window.google && window.google.maps) { resolve(true); return; }
    const start = Date.now();
    const check = setInterval(() => {
      if (window.google && window.google.maps) {
        clearInterval(check);
        resolve(true);
      } else if (Date.now() - start > timeoutMs) {
        clearInterval(check);
        resolve(false);
      }
    }, 200);
  });
}

// ---- UNIFIED GEOCODING (Google Maps JS only) ----
async function geocodeAddress(address) {
  if (!address || address.trim() === '') return null;

  const apiKey = getGoogleApiKey();
  if (!apiKey) {
    updateApiStatus('API key do Google não configurada', '#f87171');
    return null;
  }

  // Aguarda Google Maps carregar (até 10s)
  if (!window.google || !window.google.maps) {
    updateApiStatus('Aguardando Google Maps carregar...', '#fbbf24');
    const loaded = await waitForGoogleMaps(10000);
    if (!loaded) {
      updateApiStatus('Google Maps não carregou (verifique a API key e conexão)', '#f87171');
      return null;
    }
  }

  try {
    const result = await geocodeWithGoogle(address);
    geocodingAvailable = true;
    geocodingProvider = 'google';
    return result;
  } catch(e) {
    console.warn('Google Geocoding falhou:', e.message);
    updateApiStatus('Google Geocoding erro: ' + e.message, '#f87171');
    return null;
  }
}

// ---- GOOGLE DISTANCE MATRIX (client-side, funciona no navegador) ----
function getDistanceMatrix(origin, destination) {
  return new Promise((resolve) => {
    if (!window.google || !window.google.maps) { resolve(null); return; }
    const cacheKey = `${origin.lat},${origin.lng}|${destination.lat},${destination.lng}`;
    if (directionsCache[cacheKey]) { resolve(directionsCache[cacheKey]); return; }
    try {
      const service = new google.maps.DistanceMatrixService();
      service.getDistanceMatrix({
        origins: [new google.maps.LatLng(origin.lat, origin.lng)],
        destinations: [new google.maps.LatLng(destination.lat, destination.lng)],
        travelMode: google.maps.TravelMode.DRIVING,
        unitSystem: google.maps.UnitSystem.METRIC
      }, (response, status) => {
        if (status === 'OK' && response.rows[0]?.elements[0]?.status === 'OK') {
          const el = response.rows[0].elements[0];
          const result = {
            distanceKm: el.distance.value / 1000,
            durationMin: Math.round(el.duration.value / 60),
            distanceText: el.distance.text,
            durationText: el.duration.text
          };
          directionsCache[cacheKey] = result;
          resolve(result);
        } else {
          console.warn('Distance Matrix status:', status, response?.rows?.[0]?.elements?.[0]?.status);
          resolve(null);
        }
      });
    } catch(e) {
      console.warn('Distance Matrix falhou:', e.message);
      resolve(null);
    }
  });
}

// ---- GET TRAVEL INFO (Google Distance Matrix) ----
async function getTravelInfo(origin, destination) {
  if (!origin || !destination) return { km: null, mins: 15, source: 'default' };

  if (window.google && window.google.maps) {
    const dm = await getDistanceMatrix(origin, destination);
    if (dm) {
      return {
        km: dm.distanceKm,
        mins: dm.durationMin,
        source: 'google',
        distanceText: dm.distanceText,
        durationText: dm.durationText
      };
    }
  }

  // Sem Google Distance Matrix, retorna tempo padrão
  return { km: null, mins: 15, source: 'default' };
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function estimateDriveMinutes(km) {
  // ~25 km/h average speed in urban areas
  return Math.round(km / 25 * 60);
}
// Nearest-neighbor route ordering
function optimizeRoute(homeCoord, marketCoords) {
  if (marketCoords.length <= 1) return marketCoords.map((_, i) => i);
  const visited = [];
  const remaining = marketCoords.map((m, i) => i);
  let current = homeCoord;
  while (remaining.length > 0) {
    let bestIdx = 0, bestDist = Infinity;
    for (let i = 0; i < remaining.length; i++) {
      const mc = marketCoords[remaining[i]];
      if (!mc || !current) continue;
      const d = haversineKm(current.lat, current.lng, mc.lat, mc.lng);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    const chosen = remaining.splice(bestIdx, 1)[0];
    visited.push(chosen);
    if (marketCoords[chosen]) current = marketCoords[chosen];
  }
  return visited;
}
// Route optimization considering deadlines: earliest deadline first, then nearest-neighbor within same window
function optimizeRouteWithDeadlines(homeCoord, marketCoords, markets, timePerMarket, startTime, defaultTravel) {
  if (markets.length <= 1) return markets.map((_, i) => i);
  // Group by deadline urgency, then optimize by distance within groups
  const indices = markets.map((_, i) => i);
  // Sort primarily by deadline, secondarily by distance from previous point
  indices.sort((a, b) => markets[a].deadlineMin - markets[b].deadlineMin);
  // If we have coordinates, refine: within similar deadlines (<=60min apart), prefer nearest
  if (homeCoord && marketCoords.some(c => c)) {
    const result = [];
    const remaining = [...indices];
    let current = homeCoord;
    let currentTime = startTime;
    while (remaining.length > 0) {
      // Find the most urgent remaining market (earliest deadline in remaining)
      const earliestDeadline = Math.min(...remaining.map(i => markets[i].deadlineMin));
      // Get all markets within 60min of the earliest deadline (similar urgency)
      const urgentGroup = remaining.filter(i => markets[i].deadlineMin <= earliestDeadline + 60);
      // Among urgent group, pick the nearest one
      let bestIdx = 0, bestDist = Infinity;
      for (let i = 0; i < remaining.length; i++) {
        if (!urgentGroup.includes(remaining[i])) continue;
        const mc = marketCoords[remaining[i]];
        if (!mc || !current) continue;
        const d = haversineKm(current.lat, current.lng, mc.lat, mc.lng);
        if (d < bestDist) { bestDist = d; bestIdx = i; }
      }
      const chosen = remaining.splice(bestIdx, 1)[0];
      result.push(chosen);
      if (marketCoords[chosen]) current = marketCoords[chosen];
    }
    return result;
  }
  return indices; // fallback: sorted by deadline only
}
// ======================== CALCULATION ENGINE ========================
function timeToMinutes(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}
function minutesToTime(mins) {
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function formatDuration(mins) {
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  if (h === 0) return `${m}min`;
  return `${h}h${m > 0 ? m + 'm' : ''}`;
}

      const finishTime = currentTime;

        <div class="tl-item">
          <div class="tl-dot" style="border-color:${r.color};background:${r.color};"></div>
          <div class="tl-time">${minutesToTime(startTime)} → ${minutesToTime(Math.round(currentTime))}</div>
          <div class="tl-desc">${m.name} ${deadlineTag}</div>
          <div class="tl-dur">${m.items} itens | ${formatDuration(collectionTime)} | ${travelKm !== '?' ? travelKm + 'km ~' + travelMin + 'min' : '~' + travelMin + 'min (endereço não localizado)'}</div>
        </div>`;
    });
    // End summary
    const latestDeadline = Math.max(...r.markets.map(m => m.deadlineMin));
    const allOnTime = !r.deadlineMisses || r.deadlineMisses.length === 0;
    const endColor = allOnTime ? '#4ade80' : '#f87171';
    const endStatus = allOnTime ? 'Todos os prazos atendidos' : `${r.deadlineMisses.length} prazo(s) estourado(s)`;
    timelineHtml += `
      <div class="tl-item">
        <div class="tl-dot" style="border-color:${endColor};background:${endColor}30;"></div>
        <div class="tl-time">${minutesToTime(currentTime)}</div>
        <div class="tl-desc" style="color:${endColor}">${endStatus}</div>
      </div>`;
    // Warnings
    let warningHtml = '';
    if (r.deadlineMisses && r.deadlineMisses.length > 0) {
      warningHtml = `<div class="alert-box" style="margin-top:8px;">
        <h3>PRAZO(S) ESTOURADO(S)</h3>
        ${r.deadlineMisses.map(dm => `<p><strong>${dm.name}</strong> — prazo ${dm.deadline}, término previsto ${dm.finish}</p>`).join('')}
      </div>`;
    }
    if (!r.feasible && (!r.deadlineMisses || r.deadlineMisses.length === 0)) {
      warningHtml += `<div class="alert-box" style="margin-top:8px;">
        <h3>Situação: IMPOSSÍVEL</h3>
        <p>${r.name} precisa de <strong>${formatDuration(r.totalNeeded)}</strong> mas tem apenas <strong>${formatDuration(r.availableWindow)}</strong> disponíveis.</p>
      </div>`;
    }
    if (r.conf < 50) {
      warningHtml += `<div class="warn-box" style="margin-top:8px;">
        <h3>Conformidade ${r.conf}%</h3>
        <p>Historicamente trabalha apenas <strong>${formatDuration(r.effectiveTime)}</strong> de ${r.contract}h. Exige supervisão.</p>
      </div>`;
    } else if (allOnTime && r.slack >= 0 && r.slack < 30) {
      warningHtml += `<div class="warn-box" style="margin-top:8px;">
        <h3>Folga mínima: ${formatDuration(r.slack)}</h3>
        <p>Qualquer atraso pode comprometer o prazo.</p>
      </div>`;
    }
    // ===== FIX 6: conformidade warning when feasible but totalNeeded > effectiveTime =====
    if (r.feasible && r.conf >= 50 && r.totalNeeded > r.effectiveTime) {
      warningHtml += `<div class="warn-box" style="margin-top:8px;">
        <h3>Atenção: Tempo efetivo vs necessário</h3>
        <p>Baseado na conformidade de <strong>${r.conf}%</strong>, o tempo efetivo de trabalho é ~<strong>${formatDuration(r.effectiveTime)}</strong>. A rota exige <strong>${formatDuration(r.totalNeeded)}</strong>, o que ultrapassa o histórico. Supervisão recomendada.</p>
      </div>`;
    }
    html += `
      <div class="card">
        <div class="card-header">
          <span class="card-title" style="color:${r.color}">${r.name}</span>
          <span class="badge ${r.statusClass}">${r.status}</span>
        </div>
        <div class="stat-row">
          <div class="stat"><div class="stat-label">Contrato</div><div class="stat-value">${r.contract}h</div></div>
          <div class="stat"><div class="stat-label">PPM</div><div class="stat-value">${r.ppm.toFixed(2)}</div></div>
          <div class="stat"><div class="stat-label">Conform.</div><div class="stat-value" style="color:${r.conf>=70?'#4ade80':r.conf>=50?'#fbbf24':'#f87171'}">${r.conf}%</div></div>
          <div class="stat"><div class="stat-label">Mercados</div><div class="stat-value">${r.markets.length}</div></div>
        </div>
        <div class="stat-row">
          <div class="stat"><div class="stat-label">Tempo coleta</div><div class="stat-value">${formatDuration(r.totalCollectionTime)}</div></div>
          <div class="stat"><div class="stat-label">Desloc.</div><div class="stat-value">${formatDuration(r.totalTravelTime)}</div></div>
          <div class="stat"><div class="stat-label">Total</div><div class="stat-value" style="color:${r.feasible?'#4ade80':'#f87171'}">${formatDuration(r.totalNeeded)}</div></div>
          <div class="stat"><div class="stat-label">${r.slack>=0?'Folga':'Excede'}</div><div class="stat-value" style="color:${r.slack>=0?'#4ade80':'#f87171'}">${r.slack>=0?'':'+'}${formatDuration(Math.abs(r.slack))}</div></div>
        </div>
        <div class="section-title">Rota (ordenada por prazo + proximidade)</div>
        <div class="timeline">${timelineHtml}</div>
        ${warningHtml}
      </div>`;
  });
  // ===== FIX 7: Gantt chart - extend end time =====
  const allDeadlines = data.flatMap(r => r.markets.map(m => m.deadlineMin));
  const allEndTimes = data.map(r => inicio + r.totalNeeded);
  const chartEnd = Math.max(...allDeadlines, ...allEndTimes);
  const totalMinutes = chartEnd - inicio;
  html += '<div class="section-title">Cronograma Visual</div>';
  html += '<div class="gantt-container">';
  html += `<div class="gantt-header"><span>${minutesToTime(inicio)}</span><span>${minutesToTime(inicio + totalMinutes*0.25)}</span><span>${minutesToTime(inicio + totalMinutes*0.5)}</span><span>${minutesToTime(inicio + totalMinutes*0.75)}</span><span>${minutesToTime(chartEnd)}</span></div>`;
  data.forEach(r => {
    let currentMin = 0;
    html += `<div class="gantt-label" style="color:${r.color}">${r.name} (${r.markets.length} merc.)</div>`;
    html += '<div class="gantt-track">';
    r.markets.forEach((m, i) => {
      const travelMin = (r.marketTravelTimes && r.marketTravelTimes[i]) ? r.marketTravelTimes[i].mins : desloc;
      const collectionTime = (r.marketTimings && r.marketTimings[i]) ? r.marketTimings[i].collectionTime : m.items / r.ppm;
      currentMin += travelMin;
      const left = (currentMin / totalMinutes * 100);
      const width = (collectionTime / totalMinutes * 100);
      html += `<div class="gantt-bar" style="left:${left}%;width:${width}%;background:${r.color};" title="${m.name} | ${m.items} itens | Prazo: ${m.deadline}">${m.name} (${m.items})</div>`;
      // Deadline marker for this market
      const dlPos = ((m.deadlineMin - inicio) / totalMinutes * 100);
      html += `<div class="gantt-deadline" style="left:${dlPos}%;" title="Prazo ${m.name}: ${m.deadline}"></div>`;
      currentMin += collectionTime;
    });
    html += '</div>';
  });
  html += '</div>';
  // Summary table
  html += '<div class="section-title">Resumo</div><table><thead><tr><th>Pesquisador</th><th>Mercados</th><th>Tempo Total</th><th>Folga</th><th>Status</th></tr></thead><tbody>';
  data.forEach(r => {
    html += `<tr><td style="color:${r.color}">${r.name}</td><td>${r.markets.length}</td><td>${formatDuration(r.totalNeeded)}</td><td style="color:${r.slack>=0?'#4ade80':'#f87171'}">${r.slack>=0?'':'+'}${formatDuration(Math.abs(r.slack))}</td><td><span class="badge ${r.statusClass}">${r.status}</span></td></tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}
function generateRecommendation(data, inicio, desloc) {
  const container = document.getElementById('recoContent');
  const infeasible = data.filter(r => !r.feasible);
  const risky = data.filter(r => r.feasible && r.conf < 50);
  const tight = data.filter(r => r.feasible && r.conf >= 50 && r.slack < 30);
  const ok = data.filter(r => r.feasible && r.conf >= 50 && r.slack >= 30);
  let html = '';
  if (infeasible.length === 0 && risky.length === 0 && tight.length === 0) {
    html += `<div class="reco-box"><h3>Todas as rotas estão viáveis!</h3><p>Nenhuma redistribuição necessária. Todos os pesquisadores conseguem cumprir seus mercados dentro do prazo.</p></div>`;
  } else {
    // Find researchers with capacity
    const allItems = data.flatMap(r => r.markets.map(m => m.items));
    const avgItems = allItems.length > 0 ? allItems.reduce((a,b) => a+b, 0) / allItems.length : 374;
    const withCapacity = data.filter(r => r.feasible && r.slack > (avgItems / r.ppm + desloc));
    html += `<div class="section-title">Diagnóstico</div>`;
    if (infeasible.length > 0) {
      infeasible.forEach(r => {
        html += `<div class="alert-box"><h3>${r.name} — INVIÁVEL</h3>
          <p>Precisa de <strong>${formatDuration(r.totalNeeded)}</strong> para ${r.markets.length} mercados, mas tem apenas <strong>${formatDuration(r.availableWindow)}</strong>.
          ${r.markets.length > 1 ? `Considere redistribuir ${r.markets.length - 1} mercado(s) para outro pesquisador com capacidade.` : 'Mesmo com 1 mercado, o tempo não é suficiente. Considere substituição.'}</p>
        </div>`;
      });
    }
    if (risky.length > 0) {
      risky.forEach(r => {
        html += `<div class="warn-box"><h3>${r.name} — Conformidade ${r.conf}%</h3>
          <p>A rota é viável no papel (${formatDuration(r.totalNeeded)} necessárias, ${formatDuration(r.availableWindow)} disponíveis), mas historicamente trabalha apenas <strong>${formatDuration(r.effectiveTime)}</strong>. Supervisão intensa recomendada.</p>
        </div>`;
      });
    }
    if (tight.length > 0) {
      tight.forEach(r => {
        html += `<div class="warn-box"><h3>${r.name} — Folga mínima (${formatDuration(r.slack)})</h3>
          <p>A rota funciona, mas qualquer imprevisto compromete o prazo. Monitorar de perto.</p>
        </div>`;
      });
    }
    if (withCapacity.length > 0) {
      html += `<div class="section-title">Pesquisadores com capacidade extra</div>`;
      withCapacity.forEach(r => {
        const extraMarkets = Math.floor(r.slack / (avgItems / r.ppm + desloc));
        html += `<div class="reco-box"><h3>${r.name} — Pode absorver mais ${extraMarkets} mercado(s)</h3>
          <p>Folga atual: ${formatDuration(r.slack)}. Tempo por mercado extra (~${Math.round(avgItems)} itens): ~${formatDuration(avgItems / r.ppm + desloc)}. Capacidade para mais ${extraMarkets} mercado(s).</p>
        </div>`;
      });
    }
  }
  html += `<div class="section-title">Ações Recomendadas</div>
    <div class="card"><div style="font-size:12px;color:#475569;line-height:1.8;">`;
  let actionNum = 1;
  infeasible.forEach(r => {
    if (r.markets.length > 1) {
      const avgItemsR = r.markets.reduce((s,m) => s + m.items, 0) / r.markets.length;
      html += `<strong style="color:#16a34a;">${actionNum++}.</strong> <strong>Redistribuição de mercados de ${r.name}</strong> — tem ${r.markets.length} mercados mas só dá conta de ${Math.floor(r.availableWindow / (avgItemsR/r.ppm + desloc))} no tempo disponível<br>`;
    } else {
      html += `<strong style="color:#dc2626;">${actionNum++}.</strong> <strong>Avaliar substituição de ${r.name}</strong> — não consegue completar nem 1 mercado no tempo<br>`;
    }
  });
  risky.forEach(r => {
    html += `<strong style="color:#ca8a04;">${actionNum++}.</strong> <strong>Supervisionar ${r.name}</strong> — conformidade de ${r.conf}% é crítica<br>`;
  });
  if (ok.length > 0) {
    html += `<strong style="color:#16a34a;">${actionNum++}.</strong> <strong>Manter rotas de:</strong> ${ok.map(r=>r.name).join(', ')}<br>`;
  }
  html += `</div></div>`;
  container.innerHTML = html;
}
// ======================== MAP ========================
function updateMapWithCoords(researcherData) {
  // Clear existing
  markers.forEach(m => map.removeLayer(m));
  routeLines.forEach(l => map.removeLayer(l));
  markers = [];
  routeLines = [];
  const allCoords = [];
  researcherData.forEach((rd) => {
    const routeCoords = [];
    // Home marker (use real geocoded coords)
    if (rd.homeCoord) {
      const hLat = rd.homeCoord.lat;
      const hLng = rd.homeCoord.lng;
      const homeMarker = L.marker([hLat, hLng], {
        icon: createIcon('H', rd.color)
      }).addTo(map).bindPopup(`<b>${rd.name}</b><br>Casa: ${rd.home || rd.homeCoord.display || ''}`);
      markers.push(homeMarker);
      allCoords.push([hLat, hLng]);
      routeCoords.push([hLat, hLng]);
    }
    // ===== FIX 1: Map uses correct algorithm =====
    // Determine optimized order using deadline-aware algorithm (same as calculation)
    const hasCoords = rd.homeCoord && rd.marketCoords && rd.marketCoords.some(c => c);
    const order = hasCoords
      ? optimizeRouteWithDeadlines(rd.homeCoord, rd.marketCoords || [], rd.markets, 0, 0, 15)
      : rd.markets.map((_, i) => i);
    // Market markers in optimized order
    order.forEach((origIdx, seqIdx) => {
      const mc = rd.marketCoords ? rd.marketCoords[origIdx] : null;
      const m = rd.markets[origIdx];
      if (mc) {
        const mMarker = L.marker([mc.lat, mc.lng], {
          icon: createIcon(`${seqIdx + 1}`, rd.color)
        }).addTo(map).bindPopup(`<b>${seqIdx + 1}º — ${m.name}</b><br>${m.addr || mc.display || ''}<br><i>Prazo: ${m.deadline}</i>`);
        markers.push(mMarker);
        allCoords.push([mc.lat, mc.lng]);
        routeCoords.push([mc.lat, mc.lng]);
      }
    });
    // Route line connecting home → markets in order
    if (routeCoords.length > 1) {
      const line = L.polyline(routeCoords, {
        color: rd.color, weight: 3, opacity: 0.7, dashArray: '8,6', smoothFactor: 1.5
      }).addTo(map);
      routeLines.push(line);
    }
  });
  if (allCoords.length > 0) {
    map.fitBounds(allCoords, { padding: [40, 40] });
  }
}
function createIcon(letter, color) {
  return L.divIcon({
    html: `<div style="background:${color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:white;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);">${letter}</div>`,
    iconSize: [28, 28], iconAnchor: [14, 14], className: ''
  });
}
